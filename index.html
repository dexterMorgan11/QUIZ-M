            num: 530,
            text: "What is the <span class=\"key-word\">most common tumour</span> of the <span class=\"key-word\">hand</span>?",

            answer: "B"

    }];

    // ===== QUIZ ENGINE =====
    let currentSectionIdx = 0;
    let currentQuestionIdx = 0;
    let quizMode = 'standard';
    let randomizedQuestions = [];
    let globalFocusedQIdx = 0;
    let userResponses = {};
    let tempMultiSelections = [];

    const STORAGE_KEY = 'mergedSurgicalQuizResponses';

    function loadFromStorage() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) userResponses = JSON.parse(data);
        } catch (e) { userResponses = {}; }
    }

    function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(userResponses));
    }

    loadFromStorage();

    window.addEventListener('DOMContentLoaded', () => {
        const totalQs = sectionsData.reduce((acc, sec) => acc + sec.questions.length, 0);
        document.getElementById('mode-global').textContent = `Shuffle All (${totalQs} Qs)`;
        renderSidebar();
        loadQuiz();
    });

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function setQuizMode(mode) {
        quizMode = mode;
        currentQuestionIdx = 0;
        globalFocusedQIdx = 0;
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`mode-${mode}`).classList.add('active');
        if (mode === 'section') prepareSectionQuiz();
        else if (mode === 'global') prepareGlobalQuiz();
        loadQuiz();
    }

    function prepareSectionQuiz() {
        const activeSec = sectionsData[currentSectionIdx];
        randomizedQuestions = activeSec.questions.map((q, idx) => ({ ...q, originalIdx: idx, secId: activeSec.id, secName: activeSec.name }));
        shuffleArray(randomizedQuestions);
    }

    function prepareGlobalQuiz() {
        randomizedQuestions = [];
        sectionsData.forEach(sec => {
            sec.questions.forEach((q, idx) => {
                randomizedQuestions.push({ ...q, originalIdx: idx, secId: sec.id, secName: sec.name });
            });
        });
        shuffleArray(randomizedQuestions);
    }

    function renderSidebar() {
        const container = document.getElementById('case-list-container');
        container.innerHTML = '';
        sectionsData.forEach((secItem, index) => {
            const div = document.createElement('div');
            div.className = `case-item ${index === currentSectionIdx && quizMode !== 'global' ? 'active' : ''}`;
            div.onclick = () => handleSidebarClick(index);
            const progressWrapper = document.createElement('div');
            progressWrapper.className = 'case-progress-wrapper';
            const nameSpan = document.createElement('strong');
            nameSpan.textContent = secItem.name;
            progressWrapper.appendChild(nameSpan);
            const badge = document.createElement('span');
            badge.className = 'case-badge';
            badge.id = `badge-${secItem.id}`;
            badge.textContent = getSectionProgressText(secItem);
            progressWrapper.appendChild(badge);
            div.appendChild(progressWrapper);
            const descSpan = document.createElement('span');
            descSpan.style.fontSize = '0.8rem';
            descSpan.style.opacity = '0.8';
            descSpan.textContent = secItem.desc;
            div.appendChild(descSpan);
            container.appendChild(div);
        });
    }

    function handleSidebarClick(index) {
        if (quizMode === 'global') setQuizMode('standard');
        currentSectionIdx = index;
        currentQuestionIdx = 0;
        if (quizMode === 'section') prepareSectionQuiz();
        loadQuiz();
    }

    function getSectionProgressText(secItem) {
        let answered = 0;
        secItem.questions.forEach((q) => { if (userResponses[q.id]) answered++; });
        return `${answered}/${secItem.questions.length}`;
    }

    function updateSidebarBadges() {
        sectionsData.forEach((sec) => {
            const badge = document.getElementById(`badge-${sec.id}`);
            if (badge) badge.textContent = getSectionProgressText(sec);
        });
    }

    // ----- auto‑scroll -----
  function scrollToQuestionBox() {
    setTimeout(() => {
        const questionBox = document.querySelector('.question-box');
        if (!questionBox) return;

        // If the question has been answered, scroll to the navigation buttons
        // so they align with the bottom of the viewport.
        if (questionBox.classList.contains('correct') || questionBox.classList.contains('incorrect')) {
            const navButtons = document.getElementById('nav-buttons');
            if (navButtons) {
                navButtons.scrollIntoView({ behavior: 'smooth', block: 'end' });
                return;
            }
        }

        // Default: scroll to the top of the question box
        questionBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 300);
}

    // ----- load / render -----
    function loadQuiz() {
        tempMultiSelections = [];
        const view = document.getElementById('quiz-view');
        let html = '';
        if (quizMode !== 'global') {
            document.querySelectorAll('.case-item').forEach((item, idx) => {
                if (idx === currentSectionIdx) item.classList.add('active');
                else item.classList.remove('active');
            });
        }
        if (quizMode === 'global') {
            const q = randomizedQuestions[globalFocusedQIdx];
            if (!q) { view.innerHTML = "<p style='padding:20px;text-align:center;'>No questions available.</p>"; return; }
            let totalQuestions = randomizedQuestions.length;
            let totalAnswered = 0,
                score = 0;
            randomizedQuestions.forEach(item => {
                const resp = userResponses[item.id];
                if (resp) { totalAnswered++; if (resp.correct) score++; }
            });
            html += `
                <div class="score-banner">
                    <div><strong>Global Quiz Progress:</strong> ${totalAnswered} / ${totalQuestions} answered</div>
                    <div style="font-size:1.1rem">Score: <strong>${score}</strong> / ${totalAnswered} correct</div>
                    <button class="reset-btn" onclick="resetAllQuizzes()">Reset All</button>
                </div>
                ${renderQuestionBox(q, globalFocusedQIdx, totalQuestions)}
                <div id="nav-buttons" style="display:flex;justify-content:space-between;margin-top:20px;gap:15px;width:100%;">
                    <button class="reset-btn" onclick="navigateGlobal(-1)" ${globalFocusedQIdx===0?'disabled':''}>&larr; Previous</button>
                    <button class="reset-btn" onclick="navigateGlobal(1)" ${globalFocusedQIdx===totalQuestions-1?'disabled':''}>Next &rarr;</button>
                </div>
            `;
        } else {
            const activeSec = sectionsData[currentSectionIdx];
            const questionsToRender = (quizMode === 'section') ? randomizedQuestions : activeSec.questions.map((q, idx) => ({ ...q, originalIdx: idx, secId: activeSec.id }));
            let score = 0,
                totalAnswered = 0;
            questionsToRender.forEach((q) => {
                const response = userResponses[q.id];
                if (response) { totalAnswered++; if (response.correct) score++; }
            });
            const q = questionsToRender[currentQuestionIdx];
            html += `
                <div class="score-banner">
                    <div><strong>Progress:</strong> ${totalAnswered} / ${questionsToRender.length} answered</div>
                    <div style="font-size:1.1rem">Score: <strong>${score}</strong> / ${totalAnswered} correct</div>
                    <button class="reset-btn" onclick="resetActiveSectionQuiz()">Reset Chapter</button>
                </div>
                ${renderQuestionBox(q, currentQuestionIdx, questionsToRender.length)}
                <div id="nav-buttons" style="display:flex;justify-content:space-between;margin-top:20px;gap:15px;width:100%;">
                    <button class="reset-btn" onclick="navigateStandard(-1)" ${currentQuestionIdx===0?'disabled':''}>&larr; Previous</button>
                    <button class="reset-btn" onclick="navigateStandard(1)" ${currentQuestionIdx===questionsToRender.length-1?'disabled':''}>Next &rarr;</button>
                </div>
            `;
        }
        view.innerHTML = html;
        scrollToQuestionBox();
    }

    function renderQuestionBox(q, displayIdx, totalLen) {
        const response = userResponses[q.id];
        const isCorrect = response ? response.correct : null;
        const selectedVal = response ? response.selected : null;
        const isMulti = Array.isArray(q.answer);
        let boxClass = 'question-box focused-box';
        if (response) boxClass += isCorrect ? ' correct' : ' incorrect';
        let optionsHtml = '';
        q.options.forEach((opt) => {
            const letter = opt.substring(0, 1).toUpperCase();
            let btnClass = '';
            let isSelected = false;
            if (response) {
                if (isMulti) {
                    const wasSelected = selectedVal && selectedVal.includes(letter);
                    const isAnsCorrect = q.answer.includes(letter);
                    if (wasSelected && isAnsCorrect) btnClass = 'selected-correct';
                    else if (wasSelected && !isAnsCorrect) btnClass = 'selected-incorrect';
                    else if (!wasSelected && isAnsCorrect) btnClass = 'reveal-correct';
                } else {
                    if (selectedVal === letter) btnClass = isCorrect ? 'selected-correct' : 'selected-incorrect';
                    else if (letter === q.answer) btnClass = 'reveal-correct';
                }
            } else {
                if (isMulti) {
                    isSelected = tempMultiSelections.includes(letter);
                    if (isSelected) btnClass = 'temp-selected';
                }
            }
            let onclickAction = '';
            if (!response) {
                if (isMulti) onclickAction = `onclick="toggleMultiSelect('${q.id}','${letter}')"`;
                else onclickAction = `onclick="submitAnswer('${q.id}','${letter}')"`;
            }
            optionsHtml += `
                <button class="option-btn ${btnClass}" ${onclickAction} ${response?'disabled':''}>
                    <span class="option-letter">${letter}</span>
                    <span>${opt.substring(2)}</span>
                </button>
            `;
        });
        let submitBtnHtml = '';
        if (isMulti && !response) {
            submitBtnHtml = `<div style="margin-top:15px;text-align:right;"><button class="reset-btn" onclick="submitMultiAnswer('${q.id}')">Submit Answer</button></div>`;
        }
        let feedbackTextContent = '';
        if (response) {
            if (isCorrect) feedbackTextContent = '✓ Correct! All correct statements identified.';
            else {
                const ansStr = isMulti ? q.answer.join(', ') : q.answer;
                feedbackTextContent = `✗ Incorrect. The official correct answer(s): [${ansStr}].`;
            }
        }
        const secName = q.secName || sectionsData[currentSectionIdx]?.name || '';
        return `
            <div class="${boxClass}" id="q-box-${q.id}">
                <div class="question-header">
                    <span class="chapter-tag">${secName}</span>
                    <span style="font-size:0.85rem;color:var(--text-muted);font-weight:bold;text-transform:uppercase;">
                        Question ${displayIdx+1} of ${totalLen} &bull; Q${q.num}
                    </span>
                </div>
                <div class="question-text">${q.text}</div>
                ${isMulti ? '<div style="margin-bottom:10px;font-size:0.9rem;color:var(--text-muted);font-weight:bold;">(Select all that apply)</div>' : ''}
                <div class="btn-group">${optionsHtml}</div>
                ${submitBtnHtml}
                <div class="feedback-text" style="${response?'display:block;':''}">
                    ${feedbackTextContent}
                </div>
            </div>
        `;
    }

    // ----- user interactions -----
    function toggleMultiSelect(qId, letter) {
        const idx = tempMultiSelections.indexOf(letter);
        if (idx === -1) tempMultiSelections.push(letter);
        else tempMultiSelections.splice(idx, 1);
        // re‑render just this question (no full quiz reload)
        let activeSec = sectionsData[currentSectionIdx];
        let list = (quizMode === 'global') ? randomizedQuestions : (quizMode === 'section' ? randomizedQuestions : activeSec.questions);
        const qObj = list.find(q => q.id === qId);
        const displayIdx = (quizMode === 'global') ? globalFocusedQIdx : currentQuestionIdx;
        if (qObj) {
            const tempBox = document.createElement('div');
            tempBox.innerHTML = renderQuestionBox(qObj, displayIdx, list.length);
            const qBox = document.getElementById(`q-box-${qId}`);
            if (qBox) qBox.parentNode.replaceChild(tempBox.firstElementChild, qBox);
            scrollToQuestionBox(); // scroll after toggle
        }
    }

    function submitMultiAnswer(qId) {
        if (tempMultiSelections.length === 0) { alert("Please select at least one option before submitting."); return; }
        let activeSec = sectionsData[currentSectionIdx];
        let list = (quizMode === 'global') ? randomizedQuestions : (quizMode === 'section' ? randomizedQuestions : activeSec.questions);
        const qObj = list.find(q => q.id === qId);
        if (!qObj) return;
        const sortedSelected = [...tempMultiSelections].sort();
        const sortedAnswer = [...qObj.answer].sort();
        const isCorrect = sortedSelected.length === sortedAnswer.length && sortedSelected.every((val, i) => val === sortedAnswer[i]);
        userResponses[qId] = { selected: [...tempMultiSelections], correct: isCorrect };
        saveToStorage();
        updateSidebarBadges();
        loadQuiz(); // full reload → scroll inside
    }

    function submitAnswer(qId, selectedOption) {
        let activeSec = sectionsData[currentSectionIdx];
        let list = (quizMode === 'global') ? randomizedQuestions : (quizMode === 'section' ? randomizedQuestions : activeSec.questions);
        const qObj = list.find(q => q.id === qId);
        if (!qObj) return;
        const isCorrect = selectedOption === qObj.answer;
        userResponses[qId] = { selected: selectedOption, correct: isCorrect };
        saveToStorage();
        updateSidebarBadges();
        loadQuiz(); // full reload → scroll inside
    }

    // ----- navigation -----
    function navigateStandard(direction) {
        let maxLen = (quizMode === 'section') ? randomizedQuestions.length : sectionsData[currentSectionIdx].questions.length;
        currentQuestionIdx += direction;
        if (currentQuestionIdx < 0) currentQuestionIdx = 0;
        if (currentQuestionIdx >= maxLen) currentQuestionIdx = maxLen - 1;
        loadQuiz(); // scroll inside
    }

    function navigateGlobal(direction) {
        globalFocusedQIdx += direction;
        if (globalFocusedQIdx < 0) globalFocusedQIdx = 0;
        if (globalFocusedQIdx >= randomizedQuestions.length) globalFocusedQIdx = randomizedQuestions.length - 1;
        loadQuiz(); // scroll inside
    }

    // ----- reset -----
    function resetActiveSectionQuiz() {
        if (confirm("Reset current chapter answers?")) {
            const activeSec = sectionsData[currentSectionIdx];
            activeSec.questions.forEach((q) => { delete userResponses[q.id]; });
            saveToStorage();
            updateSidebarBadges();
            currentQuestionIdx = 0;
            if (quizMode === 'section') prepareSectionQuiz();
            loadQuiz(); // scroll inside
        }
    }

    function resetAllQuizzes() {
        if (confirm("Clear all answers across all profiles?")) {
            userResponses = {};
            localStorage.removeItem(STORAGE_KEY);
            updateSidebarBadges();
            currentQuestionIdx = 0;
            globalFocusedQIdx = 0;
            if (quizMode === 'global') prepareGlobalQuiz();
            loadQuiz(); // scroll inside
        }
    }
</script>
